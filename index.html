<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>春哥专用的城市万花筒</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<style>
body { margin:0; overflow:hidden; font-family:"微软雅黑",sans-serif; }
#top-bar { position:fixed; top:0; width:100%; display:flex; justify-content:center; gap:12px; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); padding:12px; z-index:10; box-sizing:border-box; flex-wrap:wrap; }
.button { color:#fff; margin:0; padding:8px 20px; border-radius:25px; background:rgba(255,255,255,0.2); cursor:pointer; transition:0.3s; font-size:14px; border:none; }
.button.active { background:#007aff; box-shadow:0 0 10px rgba(0,122,255,0.5); }
#card { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); backdrop-filter:blur(20px); color:#fff; padding:16px; border-radius:20px; display:none; width:280px; z-index:11; text-align:center; }
#radar { position:fixed; right:15px; bottom:100px; width:120px; height:120px; background:rgba(0,0,0,0.6); border-radius:50%; border:2px solid #00ff00; z-index:10; }
.dot { position:absolute; width:8px; height:8px; background:#ff4444; border-radius:50%; box-shadow:0 0 5px #ff4444; }
#debug { position:fixed; bottom:5px; left:5px; background:rgba(0,0,0,0.8); color:#0f0; font-size:10px; z-index:9999; padding:8px; border-radius:8px; font-family:monospace; pointer-events:none; max-width:70%; }
#startBtn { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20; padding:15px 30px; background:#007aff; color:#fff; border:none; border-radius:30px; font-size:18px; cursor:pointer; }
.nav-btn { width:100%; margin-top:12px; background:#007aff; color:#fff; border:none; padding:10px; border-radius:10px; cursor:pointer; font-size:14px; }
.close-btn { position:absolute; top:8px; right:12px; background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
</style>
</head>
<body>

<button id="startBtn">🎯 点击开启AR导航</button>
<div id="top-bar">
  <button class="button active" data-cat="餐饮服务">🍽️ 餐厅</button>
  <button class="button" data-cat="咖啡厅">☕ 咖啡厅</button>
  <button class="button" data-cat="酒店">🏨 酒店</button>
  <button class="button" data-cat="购物">🛒 购物</button>
  <button class="button" data-cat="景点">🏛️ 景点</button>
</div>
<div id="card">
  <button class="close-btn" onclick="document.getElementById('card').style.display='none'">✕</button>
  <div id="card-content"></div>
</div>
<div id="radar"></div>
<div id="debug">初始化中...</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-camera gps-camera rotation-reader></a-camera>
</a-scene>

<script>
const WORKER_URL = 'https://gaode.903329354.workers.dev';
const maxPOI = 30;

// 分类地图 - 使用更通用的关键词
const categories = [
  { name: "🍽️ 餐厅", keyword: "餐饮服务", types: "050000", icon: "https://cdn-icons-png.flaticon.com/512/3075/3075977.png" },
  { name: "☕ 咖啡厅", keyword: "咖啡厅", types: "050500", icon: "https://cdn-icons-png.flaticon.com/512/924/924514.png" },
  { name: "🏨 酒店", keyword: "酒店", types: "070000", icon: "https://cdn-icons-png.flaticon.com/512/139/139899.png" },
  { name: "🛒 购物", keyword: "购物", types: "060000", icon: "https://cdn-icons-png.flaticon.com/512/1061/1061102.png" },
  { name: "🏛️ 景点", keyword: "景点", types: "110000", icon: "https://cdn-icons-png.flaticon.com/512/860/860752.png" }
];

let userLat = null, userLng = null;
let smoothHeading = 0;
let allPOIs = [];
let currentCategory = "餐饮服务";
let isARStarted = false;
let locationWatchId = null;

// ========== 切换分类 ==========
async function switchCategory(categoryKeyword, categoryName) {
  if (!isARStarted) {
    console.log("AR未启动");
    return;
  }
  currentCategory = categoryKeyword;
  
  // 更新按钮样式
  document.querySelectorAll(".button").forEach(btn => {
    if (btn.getAttribute("data-cat") === categoryKeyword) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  });
  
  document.getElementById("card").style.display = "none";
  await fetchPOIs();
  renderPOIs();
}

// ========== 获取POI数据 ==========
async function fetchPOIs() {
  if (!userLat || !userLng || !isARStarted) {
    console.log("定位未就绪");
    return;
  }
  
  // 获取当前分类的 types 代码
  const currentCat = categories.find(c => c.keyword === currentCategory);
  const typesCode = currentCat ? currentCat.types : "";
  
  // 构建URL - 使用 types 参数更准确
  let url;
  if (typesCode) {
    url = `${WORKER_URL}?location=${userLng},${userLat}&types=${typesCode}&radius=2000&offset=30`;
  } else {
    url = `${WORKER_URL}?location=${userLng},${userLat}&keywords=${encodeURIComponent(currentCategory)}&radius=2000&offset=30`;
  }
  
  console.log("请求URL:", url);
  updateDebugMsg("请求中...");
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    console.log("Worker返回:", data);
    
    if (data.status === "1" && data.pois && data.pois.length > 0) {
      allPOIs = data.pois.slice(0, maxPOI);
      updateDebugMsg(`✅ 找到 ${allPOIs.length} 个地点`);
      console.log(`找到 ${allPOIs.length} 个POI`);
    } else {
      console.log(`无数据: ${data.info}`);
      updateDebugMsg(`⚠️ 附近无${categories.find(c=>c.keyword===currentCategory)?.name || currentCategory}`);
      allPOIs = [];
      
      // 如果是餐饮服务没数据，尝试通用关键词
      if (currentCategory === "餐饮服务" && data.count === "0") {
        console.log("尝试通用关键词...");
        const fallbackUrl = `${WORKER_URL}?location=${userLng},${userLat}&keywords=美食&radius=2000&offset=20`;
        const fallbackRes = await fetch(fallbackUrl);
        const fallbackData = await fallbackRes.json();
        if (fallbackData.status === "1" && fallbackData.pois && fallbackData.pois.length > 0) {
          allPOIs = fallbackData.pois.slice(0, maxPOI);
          updateDebugMsg(`✅ 找到 ${allPOIs.length} 个美食地点`);
        }
      }
    }
  } catch (e) {
    console.error("请求失败:", e);
    updateDebugMsg(`请求失败: ${e.message}`);
    allPOIs = [];
  }
}

function toRad(d) { return d * Math.PI / 180; }

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

function getBearing(lat1, lon1, lat2, lon2) {
  const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function updateRadar() {
  const radar = document.getElementById("radar");
  if (!radar) return;
  radar.innerHTML = "";
  if (!userLat || !allPOIs || allPOIs.length === 0) return;
  
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(",").map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    
    const bearing = getBearing(userLat, userLng, lat, lng);
    const angle = (bearing - smoothHeading) * Math.PI / 180;
    const distance = getDistance(userLat, userLng, lat, lng);
    
    let radiusFromCenter = Math.min(distance, 200) / 200 * 45;
    let x = 60 + radiusFromCenter * Math.sin(angle);
    let y = 60 - radiusFromCenter * Math.cos(angle);
    x = Math.min(115, Math.max(5, x));
    y = Math.min(115, Math.max(5, y));
    
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.style.left = x + "px";
    dot.style.top = y + "px";
    dot.title = `${poi.name} (${distance}m)`;
    radar.appendChild(dot);
  });
}

function renderPOIs() {
  if (!userLat || !allPOIs || allPOIs.length === 0 || !isARStarted) {
    return;
  }
  
  const scene = document.querySelector("a-scene");
  if (!scene) return;
  
  const oldEntities = scene.querySelectorAll('[gps-entity-place]');
  oldEntities.forEach(e => e.remove());
  
  updateRadar();
  
  const currentCat = categories.find(c => c.keyword === currentCategory);
  const iconUrl = currentCat ? currentCat.icon : categories[0].icon;
  
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(",").map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    
    const distance = getDistance(userLat, userLng, lat, lng);
    
    const entity = document.createElement("a-entity");
    entity.setAttribute("gps-entity-place", `latitude:${lat}; longitude:${lng}`);
    entity.setAttribute("scale", "1.2 1.2 1.2");
    
    const img = document.createElement("a-image");
    img.setAttribute("src", iconUrl);
    img.setAttribute("scale", "1.2 1.2 1.2");
    
    const text = document.createElement("a-text");
    const shortName = poi.name.length > 10 ? poi.name.substring(0, 10) + "..." : poi.name;
    text.setAttribute("value", `${shortName}\n${distance}m`);
    text.setAttribute("align", "center");
    text.setAttribute("position", "0 -0.8 0");
    text.setAttribute("color", "#fff");
    text.setAttribute("background", "rgba(0,0,0,0.6)");
    text.setAttribute("width", "2");
    
    entity.appendChild(img);
    entity.appendChild(text);
    entity.addEventListener("click", () => showCard(poi, distance, lng, lat));
    scene.appendChild(entity);
  });
  
  updateDebugMsg(`${allPOIs.length}个地点 | 方向:${Math.round(smoothHeading)}°`);
}

function showCard(poi, dist, lng, lat) {
  const cardContent = document.getElementById("card-content");
  cardContent.innerHTML = `
    <div style="font-size:18px; font-weight:bold; margin-bottom:8px;">${poi.name}</div>
    <div style="margin-bottom:5px;">🗺️ 距离: ${dist} 米</div>
    <div style="margin-bottom:5px; font-size:12px;">📍 ${poi.address || "地址信息暂无"}</div>
    ${poi.tel ? `<div style="margin-bottom:5px;">📞 ${poi.tel}</div>` : ""}
    <button class="nav-btn" onclick="goNav('${lng}','${lat}','${poi.name.replace(/'/g, "\\'")}')">🧭 高德导航</button>
  `;
  document.getElementById("card").style.display = "block";
}

function goNav(lng, lat, name) {
  window.open(`https://uri.amap.com/navigation?to=${lng},${lat},${encodeURIComponent(name)}&mode=car`);
}

function updateDebugMsg(extra = "") {
  const msg = `📍 ${userLat?.toFixed(4) || "?"}, ${userLng?.toFixed(4) || "?"}\n🎯 ${categories.find(c=>c.keyword===currentCategory)?.name || currentCategory} | ${allPOIs?.length || 0}个\n🧭 方向: ${Math.round(smoothHeading)}°\n${extra}`;
  const debugEl = document.getElementById("debug");
  if (debugEl) debugEl.innerText = msg;
}

async function startAR() {
  console.log("开始AR...");
  
  if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
    try {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== "granted") {
        alert("需要方向权限");
        return;
      }
    } catch (e) {
      alert("请允许方向权限");
      return;
    }
  }
  
  window.addEventListener("deviceorientationabsolute", (e) => {
    if (!isARStarted) return;
    let alpha = e.alpha || 0;
    smoothHeading = smoothHeading * 0.9 + alpha * 0.1;
    renderPOIs();
  });
  
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      isARStarted = true;
      updateDebugMsg("定位成功，搜索中...");
      await fetchPOIs();
      renderPOIs();
      document.getElementById("startBtn").style.display = "none";
    },
    (err) => {
      alert("定位失败: " + err.message);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
  
  locationWatchId = navigator.geolocation.watchPosition(
    (pos) => {
      if (isARStarted) {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        renderPOIs();
      }
    },
    null,
    { enableHighAccuracy: true }
  );
}

function bindEvents() {
  document.querySelectorAll(".button").forEach(btn => {
    btn.onclick = () => {
      const catKeyword = btn.getAttribute("data-cat");
      if (catKeyword) switchCategory(catKeyword);
    };
  });
}

bindEvents();
document.getElementById("startBtn").onclick = startAR;

setInterval(() => {
  if (!isARStarted) {
    document.getElementById("debug").innerHTML = "🔴 未启动\n点击下方按钮开始";
  } else if ((!allPOIs || allPOIs.length === 0) && userLat) {
    updateDebugMsg("搜索地点中...");
  } else if (userLat) {
    updateDebugMsg();
  }
}, 1000);
</script>
</body>
</html>
