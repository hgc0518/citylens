<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>春哥的城市万花筒AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<style>
* { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { overflow: hidden; font-family: system-ui, -apple-system, '微软雅黑', sans-serif; }

/* 调试面板 - 顶部左侧 */
#debug-panel {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  color: #0f0;
  font-size: 11px;
  font-family: monospace;
  padding: 8px 12px;
  border-radius: 12px;
  z-index: 100;
  pointer-events: none;
  border-left: 3px solid #00ff00;
  max-width: 75%;
}

/* 菜单按钮 */
#menu-btn {
  position: fixed;
  top: 12px;
  right: 12px;
  width: 44px;
  height: 44px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
  cursor: pointer;
  z-index: 50;
  border: 1px solid rgba(255,255,255,0.2);
}

/* 分类菜单 */
#category-menu {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(12px);
  padding: 12px;
  padding-top: 60px;
  transform: translateY(-100%);
  transition: transform 0.3s ease;
  z-index: 40;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
#category-menu.open {
  transform: translateY(0);
}
.cat-btn {
  color: white;
  background: rgba(255,255,255,0.15);
  border: none;
  padding: 8px 16px;
  border-radius: 30px;
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
}
.cat-btn.active {
  background: #007aff;
  box-shadow: 0 0 10px rgba(0,122,255,0.4);
}
.cat-btn:active { transform: scale(0.96); }

/* 卡片详情 */
#detail-card {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(20px);
  color: white;
  padding: 16px;
  border-radius: 20px;
  width: 280px;
  z-index: 60;
  display: none;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.2);
}
.close-detail {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
}
.nav-btn {
  width: 100%;
  margin-top: 12px;
  background: #007aff;
  border: none;
  padding: 10px;
  border-radius: 30px;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

/* 雷达小地图 */
#radar-map {
  position: fixed;
  right: 12px;
  bottom: 100px;
  width: 90px;
  height: 90px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  border: 2px solid #00ff88;
  z-index: 30;
  box-shadow: 0 0 15px rgba(0,255,136,0.3);
}
.radar-dot {
  position: absolute;
  width: 8px;
  height: 8px;
  background: #ff4444;
  border-radius: 50%;
  box-shadow: 0 0 5px #ff0000;
}

/* 搜索区域 */
#search-area {
  position: fixed;
  bottom: 16px;
  left: 16px;
  right: 16px;
  z-index: 45;
}
#search-box {
  display: flex;
  gap: 8px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  border-radius: 50px;
  padding: 6px;
  border: 1px solid rgba(255,255,255,0.2);
}
#search-input {
  flex: 1;
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 10px 16px;
  border-radius: 50px;
  color: white;
  font-size: 14px;
  outline: none;
}
#search-input::placeholder {
  color: rgba(255,255,255,0.5);
}
#search-do {
  background: #007aff;
  border: none;
  padding: 8px 20px;
  border-radius: 50px;
  color: white;
  font-size: 14px;
  cursor: pointer;
}
#suggest-list {
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  margin-top: 8px;
  max-height: 160px;
  overflow-y: auto;
  display: none;
}
.suggest-item {
  padding: 10px 16px;
  color: white;
  font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
}
.suggest-item:active { background: rgba(255,255,255,0.15); }

/* 开始按钮 */
#start-ar-btn {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #007aff;
  border: none;
  padding: 12px 28px;
  border-radius: 50px;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  z-index: 70;
  box-shadow: 0 0 20px rgba(0,122,255,0.5);
}
#start-ar-btn.hide {
  display: none;
}
#loading-tip {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(12px);
  padding: 12px 24px;
  border-radius: 40px;
  color: white;
  z-index: 80;
  display: none;
  font-size: 14px;
}
</style>
</head>
<body>

<button id="start-ar-btn">🎯 开启AR导航</button>
<div id="loading-tip">⏳ 定位中...</div>

<div id="debug-panel">🔴 未启动</div>
<div id="menu-btn">☰</div>

<div id="category-menu">
  <button class="cat-btn" data-cat="餐饮服务">🍽️ 餐厅</button>
  <button class="cat-btn" data-cat="咖啡厅">☕ 咖啡</button>
  <button class="cat-btn" data-cat="酒店">🏨 酒店</button>
  <button class="cat-btn" data-cat="KTV">🎤 KTV</button>
  <button class="cat-btn" data-cat="宾馆">🛏️ 宾馆</button>
  <button class="cat-btn" data-cat="汽修|维修厂">🔧 修理厂</button>
  <button class="cat-btn" data-cat="加油站">⛽ 加油站</button>
  <button class="cat-btn" data-cat="学校">📚 学校</button>
  <button class="cat-btn" data-cat="医院">🏥 医院</button>
</div>

<div id="detail-card">
  <button class="close-detail" onclick="closeCard()">✕</button>
  <div id="detail-content"></div>
</div>

<div id="radar-map"></div>

<div id="search-area">
  <div id="search-box">
    <input type="text" id="search-input" placeholder="🔍 搜索地点..." autocomplete="off">
    <button id="search-do">搜索</button>
  </div>
  <div id="suggest-list"></div>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-camera gps-camera rotation-reader></a-camera>
</a-scene>

<script>
const WORKER_URL = 'https://gaode.903329354.workers.dev';
const MAX_POI = 35;

const CATEGORIES = [
  { name: "餐厅", keyword: "餐饮服务", icon: "https://cdn-icons-png.flaticon.com/512/3075/3075977.png" },
  { name: "咖啡", keyword: "咖啡厅", icon: "https://cdn-icons-png.flaticon.com/512/924/924514.png" },
  { name: "酒店", keyword: "酒店", icon: "https://cdn-icons-png.flaticon.com/512/139/139899.png" },
  { name: "KTV", keyword: "KTV", icon: "https://cdn-icons-png.flaticon.com/512/3148/3148405.png" },
  { name: "宾馆", keyword: "宾馆", icon: "https://cdn-icons-png.flaticon.com/512/3095/3095100.png" },
  { name: "修理厂", keyword: "汽修|维修厂", icon: "https://cdn-icons-png.flaticon.com/512/3000/3000452.png" },
  { name: "加油站", keyword: "加油站", icon: "https://cdn-icons-png.flaticon.com/512/3109/3109006.png" },
  { name: "学校", keyword: "学校", icon: "https://cdn-icons-png.flaticon.com/512/2942/2942702.png" },
  { name: "医院", keyword: "医院", icon: "https://cdn-icons-png.flaticon.com/512/3043/3043710.png" }
];

let currentLat = null, currentLng = null;
let currentHeading = 0;
let poiList = [];
let activeCategory = CATEGORIES[0];
let isArActive = false;
let customSearchWord = null;
let watchId = null;

// ========== 辅助函数 ==========
function rad(d) { return d * Math.PI / 180; }

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = rad(lat2 - lat1);
  const dLon = rad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLon/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function getBearing(lat1, lon1, lat2, lon2) {
  const y = Math.sin(rad(lon2-lon1)) * Math.cos(rad(lat2));
  const x = Math.cos(rad(lat1))*Math.sin(rad(lat2)) - Math.sin(rad(lat1))*Math.cos(rad(lat2))*Math.cos(rad(lon2-lon1));
  return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
}

function updateDebug(msg) {
  const el = document.getElementById('debug-panel');
  if (el) el.innerText = msg || `${currentLat?.toFixed(4) || '?'}, ${currentLng?.toFixed(4) || '?'}\n${customSearchWord || activeCategory.name} | ${poiList.length}个 | ${Math.round(currentHeading)}°`;
}

// ========== 获取POI ==========
async function fetchPlaces() {
  if (!currentLat || !currentLng || !isArActive) return;
  
  let keyword = customSearchWord || activeCategory.keyword;
  const url = `${WORKER_URL}?type=search&location=${currentLng},${currentLat}&keywords=${encodeURIComponent(keyword)}&radius=2500&offset=${MAX_POI}`;
  
  updateDebug('⏳ 搜索中...');
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.status === '1' && data.pois?.length) {
      poiList = data.pois.slice(0, MAX_POI);
      updateDebug(`✅ ${poiList.length}个地点`);
    } else {
      poiList = [];
      updateDebug(`⚠️ 未找到"${keyword}"`);
    }
    renderArPoints();
  } catch(e) {
    console.error(e);
    poiList = [];
    updateDebug('❌ 请求失败');
  }
}

// ========== 联想搜索 ==========
let suggestTimer = null;
async function loadSuggestions() {
  const kw = document.getElementById('search-input').value.trim();
  if (!kw || kw.length < 2) {
    document.getElementById('suggest-list').style.display = 'none';
    return;
  }
  
  const loc = (currentLat && currentLng) ? `${currentLng},${currentLat}` : '';
  const url = `${WORKER_URL}?type=tips&keywords=${encodeURIComponent(kw)}&location=${loc}`;
  
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    const list = document.getElementById('suggest-list');
    list.innerHTML = '';
    
    if (data.status === '1' && data.tips?.length) {
      const seen = new Set();
      const uniq = data.tips.filter(t => {
        if (seen.has(t.name)) return false;
        seen.add(t.name);
        return true;
      }).slice(0, 8);
      
      uniq.forEach(tip => {
        const div = document.createElement('div');
        div.className = 'suggest-item';
        div.innerText = tip.name;
        if (tip.address) div.innerText += ` · ${tip.address.slice(0, 20)}`;
        div.onclick = () => {
          document.getElementById('search-input').value = tip.name;
          list.style.display = 'none';
          doCustomSearch(tip.name);
        };
        list.appendChild(div);
      });
      list.style.display = 'block';
    } else {
      list.style.display = 'none';
    }
  } catch(e) {
    console.log('联想失败', e);
    document.getElementById('suggest-list').style.display = 'none';
  }
}

function onSearchInput() {
  if (suggestTimer) clearTimeout(suggestTimer);
  suggestTimer = setTimeout(loadSuggestions, 350);
}

async function doCustomSearch(word) {
  if (!isArActive) { alert('请先开启AR'); return; }
  customSearchWord = word;
  // 清除分类高亮
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
  await fetchPlaces();
}

async function normalSearch() {
  const word = document.getElementById('search-input').value.trim();
  if (!word) return;
  await doCustomSearch(word);
}

// ========== AR渲染 ==========
function renderArPoints() {
  if (!currentLat || !currentLng || !isArActive) return;
  
  const scene = document.querySelector('a-scene');
  if (!scene) return;
  
  // 移除旧的
  document.querySelectorAll('[gps-entity-place]').forEach(el => el.remove());
  
  // 更新雷达
  const radar = document.getElementById('radar-map');
  radar.innerHTML = '';
  
  const icon = customSearchWord ? '📍' : (activeCategory.icon || '📍');
  
  poiList.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(',').map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    
    const dist = getDistance(currentLat, currentLng, lat, lng);
    const bearing = getBearing(currentLat, currentLng, lat, lng);
    const angle = (bearing - currentHeading) * Math.PI / 180;
    
    // 雷达点
    let r = Math.min(dist, 150) / 150 * 38;
    let rx = 45 + r * Math.sin(angle);
    let ry = 45 - r * Math.cos(angle);
    rx = Math.min(85, Math.max(5, rx));
    ry = Math.min(85, Math.max(5, ry));
    const dot = document.createElement('div');
    dot.className = 'radar-dot';
    dot.style.left = rx + 'px';
    dot.style.top = ry + 'px';
    dot.title = `${poi.name} ${dist}m`;
    radar.appendChild(dot);
    
    // AR实体
    const entity = document.createElement('a-entity');
    entity.setAttribute('gps-entity-place', `latitude:${lat}; longitude:${lng}`);
    entity.setAttribute('scale', '1 1 1');
    
    const img = document.createElement('a-image');
    img.setAttribute('src', icon);
    img.setAttribute('scale', '1.2 1.2 1.2');
    
    const txt = document.createElement('a-text');
    let short = poi.name.length > 10 ? poi.name.slice(0, 10)+'..' : poi.name;
    txt.setAttribute('value', `${short}\n${dist}m`);
    txt.setAttribute('align', 'center');
    txt.setAttribute('position', '0 -0.9 0');
    txt.setAttribute('color', '#fff');
    txt.setAttribute('background', 'rgba(0,0,0,0.6)');
    
    entity.appendChild(img);
    entity.appendChild(txt);
    entity.addEventListener('click', () => showDetail(poi, dist, lng, lat));
    scene.appendChild(entity);
  });
  
  updateDebug();
}

function showDetail(poi, dist, lng, lat) {
  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div style="font-weight:bold; font-size:16px;">${poi.name}</div>
    <div style="margin:8px 0;">🗺️ ${dist}米</div>
    <div style="font-size:12px;">📍 ${poi.address || '暂无'}</div>
    ${poi.tel ? `<div style="font-size:12px;">📞 ${poi.tel}</div>` : ''}
    <button class="nav-btn" onclick="window.open('https://uri.amap.com/navigation?to=${lng},${lat},${encodeURIComponent(poi.name)}&mode=car')">🧭 导航</button>
  `;
  document.getElementById('detail-card').style.display = 'block';
}

function closeCard() {
  document.getElementById('detail-card').style.display = 'none';
}

// ========== 切换分类 ==========
async function switchCategory(cat) {
  if (!isArActive) return;
  activeCategory = cat;
  customSearchWord = null;
  document.getElementById('search-input').value = '';
  document.getElementById('suggest-list').style.display = 'none';
  document.querySelectorAll('.cat-btn').forEach(btn => {
    if (btn.getAttribute('data-cat') === cat.keyword) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  await fetchPlaces();
}

// ========== 启动AR ==========
let isStarting = false;

async function startAr() {
  if (isStarting || isArActive) return;
  isStarting = true;
  
  const loading = document.getElementById('loading-tip');
  const startBtn = document.getElementById('start-ar-btn');
  
  loading.style.display = 'block';
  startBtn.disabled = true;
  
  try {
    // iOS 方向权限
    if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm !== 'granted') {
        alert('需要方向权限');
        loading.style.display = 'none';
        startBtn.disabled = false;
        isStarting = false;
        return;
      }
    }
    
    window.addEventListener('deviceorientationabsolute', (e) => {
      if (!isArActive) return;
      currentHeading = currentHeading * 0.9 + (e.alpha || 0) * 0.1;
      renderArPoints();
    });
    
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        isArActive = true;
        
        startBtn.classList.add('hide');
        loading.style.display = 'none';
        
        await fetchPlaces();
        renderArPoints();
        
        document.getElementById('category-menu').classList.add('open');
        isStarting = false;
      },
      (err) => {
        alert('定位失败: ' + err.message);
        loading.style.display = 'none';
        startBtn.disabled = false;
        isStarting = false;
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
    
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        if (isArActive) {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;
          renderArPoints();
        }
      },
      null,
      { enableHighAccuracy: true }
    );
  } catch(e) {
    loading.style.display = 'none';
    startBtn.disabled = false;
    isStarting = false;
  }
}

// ========== 事件绑定 ==========
function bindEvents() {
  document.getElementById('menu-btn').onclick = () => {
    const menu = document.getElementById('category-menu');
    menu.classList.toggle('open');
  };
  
  document.querySelectorAll('.cat-btn').forEach(btn => {
    const kw = btn.getAttribute('data-cat');
    const cat = CATEGORIES.find(c => c.keyword === kw);
    if (cat) {
      btn.onclick = () => switchCategory(cat);
    }
  });
  
  document.getElementById('search-do').onclick = normalSearch;
  document.getElementById('search-input').addEventListener('input', onSearchInput);
  document.getElementById('search-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') normalSearch();
  });
  
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#search-area')) {
      document.getElementById('suggest-list').style.display = 'none';
    }
  });
  
  document.getElementById('start-ar-btn').onclick = startAr;
}

bindEvents();

setInterval(() => {
  if (!isArActive) {
    document.getElementById('debug-panel').innerText = '🔴 未启动\n点击下方按钮';
  }
}, 1000);
</script>
</body>
</html>
