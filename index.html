<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>春哥专用的AR城市万花筒</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family:"微软雅黑"; }

#top-bar {
  position:fixed; top:0; width:100%;
  display:flex; justify-content:center;
  background:rgba(0,0,0,0.6);
  padding:6px; z-index:10;
}
.button {
  color:#fff; margin:0 6px;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(255,255,255,0.2);
}
.button.active { background:#007aff; }

#panel {
  position:fixed; bottom:0; width:100%;
  max-height:35%; overflow-y:auto;
  background:rgba(0,0,0,0.7); color:#fff;
}
.item { padding:10px; border-bottom:1px solid #444; }

#card {
  position:fixed; top:60px; left:50%;
  transform:translateX(-50%);
  background:#fff; padding:12px;
  border-radius:12px; display:none;
  width:280px; z-index:11;
}
</style>
</head>

<body>

<div id="top-bar"></div>
<div id="panel"></div>
<div id="card"></div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-camera gps-camera rotation-reader></a-camera>
</a-scene>

<script>
const AMAP_KEY = "28c589f6e6d2f024637ed23a480378c9";
const maxPOI = 15;

let userLat,userLng;
let smoothHeading = 0;
let lastRenderHeading = 0;
let allPOIs = [];
let currentCategory="餐厅";

const categories=[
  {name:"餐厅",keyword:"餐厅"},
  {name:"咖啡",keyword:"咖啡"},
  {name:"酒店",keyword:"酒店"},
  {name:"网吧",keyword:"网吧"},
  {name:"KTV",keyword:"KTV"}
];

// 按钮
const topBar=document.getElementById("top-bar");
categories.forEach(cat=>{
  const btn=document.createElement("div");
  btn.className="button";
  btn.innerText=cat.name;
  if(cat.keyword===currentCategory) btn.classList.add("active");
  topBar.appendChild(btn);

  btn.onclick=()=>{
    document.querySelectorAll(".button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentCategory=cat.keyword;
    fetchPOIs();
  };
});

// 工具函数
function toRad(d){return d*Math.PI/180;}
function getDistance(a,b,c,d){
  const R=6371000;
  const dLat=toRad(c-a);
  const dLng=toRad(d-b);
  const x=Math.sin(dLat/2)**2+
    Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}
function getBearing(a,b,c,d){
  const y=Math.sin(toRad(d-b))*Math.cos(toRad(c));
  const x=Math.cos(toRad(a))*Math.sin(toRad(c))-
    Math.sin(toRad(a))*Math.cos(toRad(c))*Math.cos(toRad(d-b));
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// 定位
navigator.geolocation.getCurrentPosition(pos=>{
  userLat=pos.coords.latitude;
  userLng=pos.coords.longitude;
  fetchPOIs();
});

// 防抖方向
window.addEventListener("deviceorientationabsolute",e=>{
  let raw=e.alpha||0;
  smoothHeading += 0.1*(raw-smoothHeading);
  renderPOIs();
});

// 获取POI
async function fetchPOIs(){
  const url=`https://restapi.amap.com/v3/place/around?key=${AMAP_KEY}&location=${userLng},${userLat}&keywords=${currentCategory}&radius=1000&offset=50`;
  const res=await fetch(url);
  const data=await res.json();

  allPOIs=data.pois.sort((a,b)=>{
    const [aLng,aLat]=a.location.split(",");
    const [bLng,bLat]=b.location.split(",");
    return getDistance(userLat,userLng,aLat,aLng)-getDistance(userLat,userLng,bLat,bLng);
  }).slice(0,maxPOI);

  renderPOIs();
}

// 防重叠核心
function filterPOIs(){
  const buckets={}; // 按角度分桶
  const result=[];

  allPOIs.forEach(poi=>{
    const [lng,lat]=poi.location.split(",");
    const bearing=getBearing(userLat,userLng,lat,lng);
    let diff=Math.abs(bearing-smoothHeading);
    if(diff>180) diff=360-diff;
    if(diff>60) return;

    const key=Math.floor(bearing/10); // 每10度一个槽
    if(!buckets[key]){
      buckets[key]=poi;
      result.push(poi);
    }
  });

  return result;
}

// 渲染
function renderPOIs(){
  if(Math.abs(smoothHeading-lastRenderHeading)<5) return;
  lastRenderHeading=smoothHeading;

  const scene=document.querySelector("a-scene");
  const panel=document.getElementById("panel");

  scene.querySelectorAll('[gps-entity-place]').forEach(e=>e.remove());
  panel.innerHTML="";

  const visiblePOIs=filterPOIs();

  visiblePOIs.forEach((poi,i)=>{
    const [lng,lat]=poi.location.split(",");
    const dist=getDistance(userLat,userLng,lat,lng);

    const entity=document.createElement("a-entity");
    entity.setAttribute("gps-entity-place",`latitude:${lat}; longitude:${lng}`);

    const text=document.createElement("a-text");
    text.setAttribute("value",poi.name+"\n"+dist+"米");
    text.setAttribute("align","center");
    text.setAttribute("color","#fff");
    text.setAttribute("background","color:#000; opacity:0.6");

    const scale=Math.max(3,30-dist/20);
    text.setAttribute("scale",`${scale} ${scale} ${scale}`);

    // 轻微错位避免完全重叠
    text.setAttribute("position",`${(i%3)*0.5} ${(i%2)*0.3} 0`);

    entity.appendChild(text);
    entity.onclick=()=>showCard(poi,dist,lng,lat);
    scene.appendChild(entity);

    const div=document.createElement("div");
    div.className="item";
    div.innerText=poi.name+" - "+dist+"米";
    div.onclick=()=>goNav(lng,lat,poi.name);
    panel.appendChild(div);
  });
}

// 卡片
function showCard(poi,dist,lng,lat){
  const card=document.getElementById("card");
  const rating=(4+Math.random()).toFixed(1);

  card.innerHTML=`
    <div style="font-weight:bold;">${poi.name}</div>
    <img src="https://picsum.photos/300/150?random=${Math.random()}" style="width:100%;margin:8px 0;border-radius:8px;">
    <div style="color:#f60;">⭐ ${rating}</div>
    <div style="color:#666;">距离 ${dist} 米</div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button onclick="goNav('${lng}','${lat}','${poi.name}')" style="flex:1;background:#007aff;color:#fff;border:none;padding:8px;border-radius:6px;">导航</button>
      <button onclick="closeCard()" style="flex:1;background:#eee;border:none;padding:8px;border-radius:6px;">关闭</button>
    </div>
  `;
  card.style.display="block";
}

function goNav(lng,lat,name){
  window.open(`https://uri.amap.com/navigation?to=${lng},${lat},${name}&mode=walk`);
}
function closeCard(){document.getElementById("card").style.display="none";}
</script>

</body>
</html>
