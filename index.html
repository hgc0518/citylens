<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>城市万花筒 - AR实景导航</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
body { overflow:hidden; font-family:'Segoe UI','微软雅黑',sans-serif; }

/* 侧边菜单 - 默认折叠 */
#side-menu {
  position:fixed;
  top:0; left:0; bottom:0;
  width:160px;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(20px);
  transform:translateX(-100%);
  transition:transform 0.3s ease;
  z-index:180;
  padding-top:70px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border-right:1px solid rgba(255,255,255,0.2);
  box-shadow:2px 0 20px rgba(0,0,0,0.3);
}
#side-menu.open { transform:translateX(0); }
#menu-toggle {
  position:fixed;
  top:15px;
  left:15px;
  width:44px; height:44px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:200;
  border:1px solid rgba(255,255,255,0.3);
}
.cat-btn {
  background:rgba(255,255,255,0.12);
  border:none;
  margin:0 12px;
  padding:12px 8px;
  border-radius:40px;
  color:white;
  font-size:13px;
  cursor:pointer;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.cat-btn.active { background:#007aff; box-shadow:0 0 12px rgba(0,122,255,0.5); }

/* 搜索区域 */
#search-area {
  position:fixed;
  left:0; right:0;
  bottom:20px;
  z-index:170;
  padding:0 16px;
  transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
  pointer-events:none;
}
#search-area.center-mode {
  bottom:50%;
  transform:translateY(50%);
}
#search-box {
  display:flex;
  gap:10px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(20px);
  border-radius:60px;
  padding:6px;
  border:1px solid rgba(255,255,255,0.25);
  pointer-events:auto;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
#search-input {
  flex:1;
  background:rgba(255,255,255,0.12);
  border:none;
  padding:14px 18px;
  border-radius:60px;
  color:white;
  font-size:16px;
  outline:none;
}
#search-input::placeholder { color:rgba(255,255,255,0.6); }
#search-btn {
  background:#007aff;
  border:none;
  padding:12px 24px;
  border-radius:60px;
  color:white;
  font-size:15px;
  cursor:pointer;
  font-weight:bold;
}
#suggest-list {
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(20px);
  border-radius:20px;
  margin-top:10px;
  max-height:220px;
  overflow-y:auto;
  display:none;
  border:1px solid rgba(255,255,255,0.2);
  pointer-events:auto;
}
.suggest-item {
  padding:12px 18px;
  color:white;
  font-size:14px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
  transition:background 0.1s;
}
.suggest-item:active { background:rgba(255,255,255,0.15); }
.suggest-item:last-child { border-bottom:none; }

/* 雷达 */
#radar-container {
  position:fixed;
  bottom:95px;
  right:15px;
  z-index:160;
  text-align:center;
}
#radar-title {
  color:white;
  font-size:11px;
  margin-bottom:6px;
  background:rgba(0,0,0,0.7);
  padding:3px 10px;
  border-radius:20px;
  font-weight:bold;
}
#radar-map {
  width:110px;
  height:110px;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(4px);
  border-radius:50%;
  border:2px solid #00ff88;
  position:relative;
  box-shadow:0 0 15px rgba(0,255,136,0.4);
}
.radar-dot {
  position:absolute;
  width:8px; height:8px;
  background:#ff4444;
  border-radius:50%;
  box-shadow:0 0 5px #ff0000;
}
.radar-dot-target { background:#ffff00; box-shadow:0 0 8px #ffff00; }
.radar-center {
  position:absolute;
  width:10px; height:10px;
  background:#00ff88;
  border-radius:50%;
  left:50px; top:50px;
  box-shadow:0 0 10px #00ff88;
}
.radar-north {
  position:absolute;
  top:5px;
  left:50px;
  color:#00ff88;
  font-size:11px;
  font-weight:bold;
}

/* 调试信息 - 右上角 */
#debug {
  position:fixed;
  top:60px;
  right:15px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  color:#0f0;
  font-size:10px;
  font-family:monospace;
  padding:5px 10px;
  border-radius:8px;
  z-index:160;
  pointer-events:none;
}
#status {
  position:fixed;
  top:15px;
  right:15px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  padding:6px 14px;
  border-radius:30px;
  color:white;
  font-size:11px;
  z-index:160;
  pointer-events:none;
}
#search-result-panel {
  position:fixed;
  bottom:160px;
  right:15px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(12px);
  padding:8px 14px;
  border-radius:20px;
  color:white;
  font-size:11px;
  z-index:160;
  display:none;
  text-align:center;
  border-left:3px solid #ffaa00;
}
#startBtn {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#007aff;
  border:none;
  padding:16px 42px;
  border-radius:60px;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  z-index:300;
  box-shadow:0 0 35px rgba(0,122,255,0.8);
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0% { transform:translate(-50%,-50%) scale(1); opacity:1; }
  50% { transform:translate(-50%,-50%) scale(1.05); opacity:0.9; }
  100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
}
.hide { display:none !important; }
#loading {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(12px);
  padding:12px 24px;
  border-radius:40px;
  color:white;
  z-index:250;
}
</style>
</head>
<body>

<button id="startBtn">🎯 启动城市万花筒</button>
<div id="loading" class="hide">⏳ 定位中...</div>

<div id="side-menu">
  <button class="cat-btn" data-type="餐饮服务">🍔 餐饮</button>
  <button class="cat-btn" data-type="咖啡厅">☕ 咖啡</button>
  <button class="cat-btn" data-type="酒店">🏨 酒店</button>
  <button class="cat-btn" data-type="购物">🛒 购物</button>
  <button class="cat-btn" data-type="景点">🏛️ 景点</button>
  <button class="cat-btn" data-type="KTV">🎤 KTV</button>
  <button class="cat-btn" data-type="加油站">⛽ 加油站</button>
  <button class="cat-btn" data-type="医院">🏥 医院</button>
  <button class="cat-btn" data-type="学校">📚 学校</button>
</div>
<div id="menu-toggle">☰</div>

<div id="search-area" class="hide">
  <div id="search-box">
    <input type="text" id="search-input" placeholder="🔍 搜索任意地点" autocomplete="off">
    <button id="search-btn">搜索</button>
  </div>
  <div id="suggest-list"></div>
</div>

<div id="radar-container" class="hide">
  <div id="radar-title">🗺️ 雷达</div>
  <div id="radar-map">
    <div class="radar-center"></div>
    <div class="radar-north">N</div>
  </div>
</div>

<div id="debug">📱 点击下方按钮启动</div>
<div id="status">🌍 等待启动</div>
<div id="search-result-panel"></div>

<a-scene id="scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-camera id="camera" gps-camera rotation-reader></a-camera>
</a-scene>

<script>
const WORKER_URL = 'https://gaode.903329354.workers.dev';
const SEARCH_RADIUS = 800;
const MAX_POI = 50;
let currentLat = null, currentLng = null;
let currentHeading = 0;
let allPOIs = [];
let activeType = "餐饮服务";
let isARActive = false;
let targetPOI = null;

// DOM 元素
const startBtn = document.getElementById('startBtn');
const loadingDiv = document.getElementById('loading');
const debugDiv = document.getElementById('debug');
const statusDiv = document.getElementById('status');
const sideMenu = document.getElementById('side-menu');
const menuToggle = document.getElementById('menu-toggle');
const searchArea = document.getElementById('search-area');
const radarContainer = document.getElementById('radar-container');
const searchInput = document.getElementById('search-input');
const searchBtn = document.getElementById('search-btn');
const suggestList = document.getElementById('suggest-list');
const radarMap = document.getElementById('radar-map');
const searchResultPanel = document.getElementById('search-result-panel');

// 辅助函数
function rad(d) { return d * Math.PI / 180; }
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = rad(lat2 - lat1);
  const dLon = rad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLon/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}
function getBearing(lat1, lon1, lat2, lon2) {
  const y = Math.sin(rad(lon2-lon1)) * Math.cos(rad(lat2));
  const x = Math.cos(rad(lat1))*Math.sin(rad(lat2)) - Math.sin(rad(lat1))*Math.cos(rad(lat2))*Math.cos(rad(lon2-lon1));
  return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
}
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

// 联想搜索
let suggestTimer = null;
async function fetchSuggestions(keyword) {
  if (!keyword || keyword.length < 2) {
    suggestList.style.display = 'none';
    return;
  }
  const loc = (currentLat && currentLng) ? `${currentLng},${currentLat}` : '';
  const url = `${WORKER_URL}?type=tips&keywords=${encodeURIComponent(keyword)}&location=${loc}`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    console.log('联想返回:', data);
    suggestList.innerHTML = '';
    if (data.status === '1' && data.tips && Array.isArray(data.tips) && data.tips.length > 0) {
      const seen = new Set();
      const uniq = data.tips.filter(t => { if (!t.name || seen.has(t.name)) return false; seen.add(t.name); return true; }).slice(0, 8);
      if (uniq.length === 0) { suggestList.style.display = 'none'; return; }
      uniq.forEach(tip => {
        const div = document.createElement('div');
        div.className = 'suggest-item';
        div.innerHTML = `<b>${escapeHtml(tip.name)}</b><br><span style="font-size:10px; color:#aaa;">${escapeHtml(tip.address || '')}</span>`;
        div.onclick = () => {
          searchInput.value = tip.name;
          suggestList.style.display = 'none';
          searchByKeyword(tip.name);
          searchInput.blur();
        };
        suggestList.appendChild(div);
      });
      suggestList.style.display = 'block';
    } else {
      suggestList.style.display = 'none';
    }
  } catch(e) { console.error('联想失败:', e); suggestList.style.display = 'none'; }
}
function onSearchInput() {
  if (suggestTimer) clearTimeout(suggestTimer);
  const kw = searchInput.value.trim();
  suggestTimer = setTimeout(() => fetchSuggestions(kw), 350);
}

// 搜索
async function searchByKeyword(keyword) {
  if (!isARActive) { alert('请先启动AR'); return; }
  if (!keyword) keyword = searchInput.value.trim();
  if (!keyword) return;
  debugDiv.innerText = `🔍 搜索: ${keyword}...`;
  const url = `${WORKER_URL}?type=search&location=${currentLng},${currentLat}&keywords=${encodeURIComponent(keyword)}&radius=2000&offset=20`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.status === '1' && data.pois?.length) {
      allPOIs = data.pois.slice(0, MAX_POI);
      targetPOI = allPOIs[0];
      renderARMarkers();
      const dist = getDistance(currentLat, currentLng, parseFloat(targetPOI.location.split(',')[1]), parseFloat(targetPOI.location.split(',')[0]));
      searchResultPanel.style.display = 'block';
      searchResultPanel.innerHTML = `🎯 ${targetPOI.name}<br>📏 ${dist}米`;
      debugDiv.innerText = `✅ ${allPOIs.length} 个结果`;
      statusDiv.innerText = `🎯 ${targetPOI.name.slice(0,15)} ${dist}m`;
    } else {
      debugDiv.innerText = `❌ 未找到: ${keyword}`;
      allPOIs = [];
      renderARMarkers();
    }
  } catch(e) { debugDiv.innerText = `❌ 搜索失败`; }
}

// 获取周边POI
async function fetchNearbyPOIs() {
  if (!currentLat || !currentLng) return [];
  const url = `${WORKER_URL}?type=search&location=${currentLng},${currentLat}&keywords=${encodeURIComponent(activeType)}&radius=${SEARCH_RADIUS}&offset=${MAX_POI}`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.status === '1' && data.pois?.length) {
      debugDiv.innerText = `✅ ${data.pois.length} 个${activeType}`;
      statusDiv.innerText = `📍 ${data.pois.length} 个地点`;
      return data.pois;
    } else {
      debugDiv.innerText = `⚠️ 附近无${activeType}`;
      return [];
    }
  } catch(e) { debugDiv.innerText = `❌ 请求失败`; return []; }
}

// 渲染AR
function renderARMarkers() {
  const scene = document.getElementById('scene');
  if (!scene) return;
  document.querySelectorAll('[gps-entity-place]').forEach(m => m.remove());
  if (!allPOIs.length) { updateRadar(); return; }
  updateRadar();
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(',').map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    const distance = getDistance(currentLat, currentLng, lat, lng);
    const bearing = getBearing(currentLat, currentLng, lat, lng);
    const isTarget = (targetPOI && poi.name === targetPOI.name);
    const entity = document.createElement('a-entity');
    entity.setAttribute('gps-entity-place', `latitude:${lat}; longitude:${lng}`);
    entity.setAttribute('scale', '1.3 1.3 1.3');
    if (isTarget) {
      const arrowRing = document.createElement('a-ring');
      arrowRing.setAttribute('radius-inner', '0.3');
      arrowRing.setAttribute('radius-outer', '0.7');
      arrowRing.setAttribute('color', '#ff6600');
      arrowRing.setAttribute('position', '0 1.2 0');
      arrowRing.setAttribute('animation', 'property: rotation; to: 0 360 0; dur: 1500; loop: true');
      entity.appendChild(arrowRing);
    }
    const icon = document.createElement('a-circle');
    icon.setAttribute('radius', '0.5');
    icon.setAttribute('color', isTarget ? '#ff6600' : '#007aff');
    icon.setAttribute('opacity', '0.95');
    const shortName = poi.name.length > 10 ? poi.name.substring(0,10)+'..' : poi.name;
    const text = document.createElement('a-text');
    text.setAttribute('value', `${isTarget ? '🎯 ' : ''}${shortName}\n${distance}m`);
    text.setAttribute('align', 'center');
    text.setAttribute('position', '0 -0.9 0');
    text.setAttribute('color', isTarget ? '#ffaa66' : '#fff');
    text.setAttribute('background', 'rgba(0,0,0,0.7)');
    text.setAttribute('width', '3');
    entity.appendChild(icon);
    entity.appendChild(text);
    entity.addEventListener('click', () => {
      targetPOI = poi;
      statusDiv.innerText = `🎯 ${poi.name.slice(0,12)} | ${distance}m`;
      searchResultPanel.style.display = 'block';
      searchResultPanel.innerHTML = `🎯 ${poi.name}<br>📏 ${distance}米<br>🧭 ${Math.round(bearing)}°`;
      if (navigator.vibrate) navigator.vibrate(30);
      renderARMarkers();
    });
    scene.appendChild(entity);
  });
}

// 更新雷达
function updateRadar() {
  if (!currentLat || !currentLng) return;
  radarMap.innerHTML = '<div class="radar-center"></div><div class="radar-north">N</div>';
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(',').map(Number);
    const distance = getDistance(currentLat, currentLng, lat, lng);
    const bearing = getBearing(currentLat, currentLng, lat, lng);
    const angle = (bearing - currentHeading) * Math.PI/180;
    let radius = Math.min(distance, 150) / 150 * 45;
    let x = 55 + radius * Math.sin(angle);
    let y = 55 - radius * Math.cos(angle);
    x = Math.min(105, Math.max(5, x));
    y = Math.min(105, Math.max(5, y));
    const dot = document.createElement('div');
    dot.className = 'radar-dot';
    if (targetPOI && poi.name === targetPOI.name) dot.classList.add('radar-dot-target');
    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    dot.title = `${poi.name} ${distance}m`;
    radarMap.appendChild(dot);
  });
}

async function refresh() {
  if (!isARActive) return;
  targetPOI = null;
  searchResultPanel.style.display = 'none';
  allPOIs = await fetchNearbyPOIs();
  renderARMarkers();
}
async function switchType(type) {
  activeType = type;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    if (btn.getAttribute('data-type') === type) btn.classList.add('active');
    else btn.classList.remove('active');
  });
  await refresh();
}

// 启动AR
async function startAR() {
  loadingDiv.classList.remove('hide');
  if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm !== 'granted') { alert('需要方向权限'); loadingDiv.classList.add('hide'); return; }
    } catch(e) { alert('请允许方向权限'); loadingDiv.classList.add('hide'); return; }
  }
  window.addEventListener('deviceorientationabsolute', (e) => {
    if (!isARActive) return;
    currentHeading = currentHeading * 0.85 + (e.alpha || 0) * 0.15;
    updateRadar();
  });
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      isARActive = true;
      startBtn.classList.add('hide');
      loadingDiv.classList.add('hide');
      searchArea.classList.remove('hide');
      radarContainer.classList.remove('hide');
      debugDiv.innerText = `📍 ${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
      statusDiv.innerText = `📍 定位成功`;
      await refresh();
    },
    (err) => { alert('定位失败: '+err.message); loadingDiv.classList.add('hide'); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
  navigator.geolocation.watchPosition(
    (pos) => { if (isARActive) { currentLat = pos.coords.latitude; currentLng = pos.coords.longitude; updateRadar(); } },
    null,
    { enableHighAccuracy: true }
  );
}

// 事件绑定
function bindEvents() {
  startBtn.onclick = startAR;
  menuToggle.onclick = () => sideMenu.classList.toggle('open');
  searchBtn.onclick = () => searchByKeyword(null);
  searchInput.addEventListener('input', onSearchInput);
  searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchByKeyword(null); });
  searchInput.addEventListener('focus', () => searchArea.classList.add('center-mode'));
  searchInput.addEventListener('blur', () => searchArea.classList.remove('center-mode'));
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = () => {
      const type = btn.getAttribute('data-type');
      if (type) switchType(type);
    };
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#search-area')) suggestList.style.display = 'none';
  });
}
bindEvents();
setInterval(() => { if (isARActive) updateRadar(); }, 150);
</script>
</body>
</html>
