<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>春哥的城市万花筒AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<style>
* { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
body { margin:0; overflow:hidden; font-family:"微软雅黑",sans-serif; }

/* 顶部菜单 - 可折叠 */
#menu-toggle {
  position:fixed;
  top:12px;
  left:12px;
  width:40px;
  height:40px;
  background:rgba(0,0,0,0.7);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
  cursor:pointer;
  color:white;
  font-size:22px;
  border:1px solid rgba(255,255,255,0.3);
  backdrop-filter:blur(5px);
}
#top-bar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  padding:12px 12px 12px 55px;
  z-index:15;
  transform:translateY(-100%);
  transition:transform 0.3s ease;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
#top-bar.open {
  transform:translateY(0);
}
.button {
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  cursor:pointer;
  transition:0.2s;
  font-size:12px;
  border:none;
  white-space:nowrap;
  -webkit-tap-highlight-color: transparent;
}
.button:active {
  transform:scale(0.96);
  background:rgba(255,255,255,0.3);
}
.button.active {
  background:#007aff;
  box-shadow:0 0 8px rgba(0,122,255,0.5);
}

/* 卡片 */
#card {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(20px);
  color:#fff;
  padding:16px;
  border-radius:20px;
  display:none;
  width:280px;
  z-index:11;
  text-align:center;
}
.close-btn {
  position:absolute;
  top:8px;
  right:12px;
  background:none;
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}
.nav-btn {
  width:100%;
  margin-top:12px;
  background:#007aff;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
}

/* 雷达 */
#radar {
  position:fixed;
  right:15px;
  bottom:100px;
  width:100px;
  height:100px;
  background:rgba(0,0,0,0.6);
  border-radius:50%;
  border:2px solid #00ff00;
  z-index:10;
}
.dot {
  position:absolute;
  width:8px;
  height:8px;
  background:#ff4444;
  border-radius:50%;
  box-shadow:0 0 5px #ff4444;
}

/* 调试信息 */
#debug {
  position:fixed;
  bottom:5px;
  left:5px;
  background:rgba(0,0,0,0.8);
  color:#0f0;
  font-size:10px;
  z-index:9999;
  padding:6px;
  border-radius:6px;
  font-family:monospace;
  pointer-events:none;
  max-width:70%;
}

/* 开始按钮 - 优化版 */
#startBtn {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  z-index:30;
  padding:10px 24px;
  background:#007aff;
  color:#fff;
  border:none;
  border-radius:40px;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
  transition:0.2s;
  white-space:nowrap;
  -webkit-tap-highlight-color: transparent;
}
#startBtn:active {
  transform:translateX(-50%) scale(0.96);
  opacity:0.9;
}
.hidden {
  display:none !important;
}

/* 加载提示 */
#loading {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.8);
  color:#fff;
  padding:12px 24px;
  border-radius:30px;
  font-size:14px;
  z-index:25;
  display:none;
  white-space:nowrap;
}
</style>
</head>
<body>

<button id="startBtn">🎯 开启AR导航</button>
<div id="loading">⏳ 定位中，请稍候...</div>
<div id="menu-toggle">☰</div>
<div id="top-bar">
  <button class="button" data-cat="餐饮服务">🍽️ 餐厅</button>
  <button class="button" data-cat="咖啡厅">☕ 咖啡</button>
  <button class="button" data-cat="酒店">🏨 酒店</button>
  <button class="button" data-cat="KTV">🎤 KTV</button>
  <button class="button" data-cat="宾馆">🛏️ 宾馆</button>
  <button class="button" data-cat="汽修|维修厂">🔧 修理厂</button>
  <button class="button" data-cat="加油站">⛽ 加油站</button>
  <button class="button" data-cat="学校">📚 学校</button>
  <button class="button" data-cat="医院">🏥 医院</button>
</div>
<div id="card">
  <button class="close-btn" onclick="document.getElementById('card').style.display='none'">✕</button>
  <div id="card-content"></div>
</div>
<div id="radar"></div>
<div id="debug">🔴 未启动<br>点击下方按钮</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-camera gps-camera rotation-reader></a-camera>
</a-scene>

<script>
const WORKER_URL = 'https://gaode.903329354.workers.dev';
const maxPOI = 25;

// 分类配置
const categories = [
  { name: "餐厅", keyword: "餐饮服务", icon: "https://cdn-icons-png.flaticon.com/512/3075/3075977.png" },
  { name: "咖啡", keyword: "咖啡厅", icon: "https://cdn-icons-png.flaticon.com/512/924/924514.png" },
  { name: "酒店", keyword: "酒店", icon: "https://cdn-icons-png.flaticon.com/512/139/139899.png" },
  { name: "KTV", keyword: "KTV", icon: "https://cdn-icons-png.flaticon.com/512/3148/3148405.png" },
  { name: "宾馆", keyword: "宾馆", icon: "https://cdn-icons-png.flaticon.com/512/3095/3095100.png" },
  { name: "修理厂", keyword: "汽修|维修厂", icon: "https://cdn-icons-png.flaticon.com/512/3000/3000452.png" },
  { name: "加油站", keyword: "加油站", icon: "https://cdn-icons-png.flaticon.com/512/3109/3109006.png" },
  { name: "学校", keyword: "学校", icon: "https://cdn-icons-png.flaticon.com/512/2942/2942702.png" },
  { name: "医院", keyword: "医院", icon: "https://cdn-icons-png.flaticon.com/512/3043/3043710.png" }
];

let userLat = null, userLng = null;
let smoothHeading = 0;
let allPOIs = [];
let currentCategory = categories[0];
let isARStarted = false;
let locationWatchId = null;
let isMenuOpen = false;

// ========== 菜单折叠 ==========
function toggleMenu() {
  isMenuOpen = !isMenuOpen;
  const bar = document.getElementById("top-bar");
  if (isMenuOpen) {
    bar.classList.add("open");
  } else {
    bar.classList.remove("open");
  }
}

// ========== 切换分类 ==========
async function switchCategory(cat) {
  if (!isARStarted) {
    console.log("等待AR启动...");
    return;
  }
  currentCategory = cat;
  
  document.querySelectorAll(".button").forEach((btn, idx) => {
    if (idx < categories.length && categories[idx].keyword === cat.keyword) {
      btn.classList.add("active");
    } else if (idx < categories.length) {
      btn.classList.remove("active");
    }
  });
  
  document.getElementById("card").style.display = "none";
  await fetchPOIs();
  renderPOIs();
  updateDebugMsg();
}

// ========== 获取POI数据 ==========
async function fetchPOIs() {
  if (!userLat || !userLng || !isARStarted) return;
  
  let keyword = currentCategory.keyword;
  const url = `${WORKER_URL}?location=${userLng},${userLat}&keywords=${encodeURIComponent(keyword)}&radius=2000&offset=${maxPOI}`;
  
  console.log("请求:", url);
  updateDebugMsg("搜索中...");
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    console.log("返回:", data);
    
    if (data.status === "1" && data.pois && data.pois.length > 0) {
      allPOIs = data.pois.slice(0, maxPOI);
      updateDebugMsg(`✅ ${allPOIs.length}个${currentCategory.name}`);
    } else {
      updateDebugMsg(`⚠️ 附近无${currentCategory.name}`);
      allPOIs = [];
    }
  } catch (e) {
    console.error("请求失败:", e);
    updateDebugMsg(`请求失败`);
    allPOIs = [];
  }
}

function toRad(d) { return d * Math.PI / 180; }

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

function getBearing(lat1, lon1, lat2, lon2) {
  const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function updateRadar() {
  const radar = document.getElementById("radar");
  if (!radar) return;
  radar.innerHTML = "";
  if (!userLat || !allPOIs || allPOIs.length === 0) return;
  
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(",").map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    
    const bearing = getBearing(userLat, userLng, lat, lng);
    const angle = (bearing - smoothHeading) * Math.PI / 180;
    const distance = getDistance(userLat, userLng, lat, lng);
    
    let radiusFromCenter = Math.min(distance, 150) / 150 * 40;
    let x = 50 + radiusFromCenter * Math.sin(angle);
    let y = 50 - radiusFromCenter * Math.cos(angle);
    x = Math.min(95, Math.max(5, x));
    y = Math.min(95, Math.max(5, y));
    
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.style.left = x + "px";
    dot.style.top = y + "px";
    dot.title = `${poi.name} (${distance}m)`;
    radar.appendChild(dot);
  });
}

function renderPOIs() {
  if (!userLat || !allPOIs || allPOIs.length === 0 || !isARStarted) return;
  
  const scene = document.querySelector("a-scene");
  if (!scene) return;
  
  const oldEntities = scene.querySelectorAll('[gps-entity-place]');
  oldEntities.forEach(e => e.remove());
  
  updateRadar();
  
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(",").map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    
    const distance = getDistance(userLat, userLng, lat, lng);
    
    const entity = document.createElement("a-entity");
    entity.setAttribute("gps-entity-place", `latitude:${lat}; longitude:${lng}`);
    entity.setAttribute("scale", "1 1 1");
    
    const img = document.createElement("a-image");
    img.setAttribute("src", currentCategory.icon);
    img.setAttribute("scale", "1 1 1");
    
    const text = document.createElement("a-text");
    const shortName = poi.name.length > 8 ? poi.name.substring(0, 8) + ".." : poi.name;
    text.setAttribute("value", `${shortName}\n${distance}m`);
    text.setAttribute("align", "center");
    text.setAttribute("position", "0 -0.7 0");
    text.setAttribute("color", "#fff");
    text.setAttribute("background", "rgba(0,0,0,0.5)");
    text.setAttribute("width", "2");
    
    entity.appendChild(img);
    entity.appendChild(text);
    entity.addEventListener("click", () => showCard(poi, distance, lng, lat));
    scene.appendChild(entity);
  });
  
  updateDebugMsg(`${allPOIs.length}个${currentCategory.name} | ${Math.round(smoothHeading)}°`);
}

function showCard(poi, dist, lng, lat) {
  const cardContent = document.getElementById("card-content");
  cardContent.innerHTML = `
    <div style="font-size:18px; font-weight:bold; margin-bottom:8px;">${poi.name}</div>
    <div style="margin-bottom:5px;">🗺️ 距离: ${dist} 米</div>
    <div style="margin-bottom:5px; font-size:12px;">📍 ${poi.address || "暂无"}</div>
    ${poi.tel ? `<div style="margin-bottom:5px;">📞 ${poi.tel}</div>` : ""}
    <button class="nav-btn" onclick="goNav('${lng}','${lat}','${poi.name.replace(/'/g, "\\'")}')">🧭 导航</button>
  `;
  document.getElementById("card").style.display = "block";
}

function goNav(lng, lat, name) {
  window.open(`https://uri.amap.com/navigation?to=${lng},${lat},${encodeURIComponent(name)}&mode=car`);
}

function updateDebugMsg(extra = "") {
  const msg = `📍 ${userLat?.toFixed(4) || "?"}, ${userLng?.toFixed(4) || "?"}\n🎯 ${currentCategory.name} | ${allPOIs?.length || 0}个\n🧭 ${Math.round(smoothHeading)}°\n${extra}`;
  const debugEl = document.getElementById("debug");
  if (debugEl) debugEl.innerText = msg;
}

// ========== 启动AR（优化版） ==========
let isStarting = false;

async function startAR() {
  if (isStarting || isARStarted) return;
  isStarting = true;
  
  console.log("启动AR...");
  const loading = document.getElementById("loading");
  const startBtn = document.getElementById("startBtn");
  
  loading.style.display = "block";
  startBtn.disabled = true;
  
  try {
    // iOS方向权限
    if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
      try {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== "granted") {
          alert("需要方向权限");
          loading.style.display = "none";
          startBtn.disabled = false;
          isStarting = false;
          return;
        }
      } catch (e) {
        alert("请允许方向权限");
        loading.style.display = "none";
        startBtn.disabled = false;
        isStarting = false;
        return;
      }
    }
    
    // 监听方向
    window.addEventListener("deviceorientationabsolute", (e) => {
      if (!isARStarted) return;
      let alpha = e.alpha || 0;
      smoothHeading = smoothHeading * 0.9 + alpha * 0.1;
      renderPOIs();
    });
    
    // 获取位置
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        isARStarted = true;
        
        // 隐藏按钮和加载
        startBtn.classList.add("hidden");
        loading.style.display = "none";
        
        updateDebugMsg("定位成功，加载中...");
        await fetchPOIs();
        renderPOIs();
        
        // 菜单默认打开
        isMenuOpen = true;
        document.getElementById("top-bar").classList.add("open");
        
        isStarting = false;
      },
      (err) => {
        alert("定位失败: " + err.message);
        loading.style.display = "none";
        startBtn.disabled = false;
        startBtn.classList.remove("hidden");
        isStarting = false;
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
    
    // 持续监听位置
    locationWatchId = navigator.geolocation.watchPosition(
      (pos) => {
        if (isARStarted) {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          renderPOIs();
        }
      },
      null,
      { enableHighAccuracy: true }
    );
    
  } catch (e) {
    console.error("启动失败:", e);
    loading.style.display = "none";
    startBtn.disabled = false;
    isStarting = false;
  }
}

// ========== 绑定事件 ==========
function bindEvents() {
  document.getElementById("menu-toggle").onclick = toggleMenu;
  
  document.querySelectorAll(".button").forEach((btn, idx) => {
    btn.onclick = () => {
      if (idx < categories.length) {
        switchCategory(categories[idx]);
      }
    };
  });
  
  const startBtn = document.getElementById("startBtn");
  startBtn.onclick = startAR;
  // 移除 touchend 重复绑定，避免多次触发
  startBtn.ontouchend = (e) => {
    e.preventDefault();
    startAR();
  };
}

// ========== 初始化 ==========
bindEvents();

// 初始菜单闭合
document.getElementById("top-bar").classList.remove("open");

// 每秒更新调试
setInterval(() => {
  if (!isARStarted) {
    document.getElementById("debug").innerHTML = "🔴 未启动\n点击下方按钮";
  } else if ((!allPOIs || allPOIs.length === 0) && userLat) {
    updateDebugMsg("搜索中...");
  } else if (userLat) {
    updateDebugMsg();
  }
}, 1000);
</script>
</body>
</html>
