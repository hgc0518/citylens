<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>春哥专用的城市万花筒</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  overflow: hidden;
  font-family: 'Segoe UI', '微软雅黑', sans-serif;
}
.a-canvas {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
}
/* 调试信息 */
#debug {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  color: #0f0;
  font-size: 10px;
  font-family: monospace;
  padding: 6px 10px;
  border-radius: 8px;
  z-index: 200;
  pointer-events: none;
}
/* 顶部分类菜单 */
#category-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  z-index: 100;
  justify-content: center;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.cat-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  padding: 6px 14px;
  border-radius: 30px;
  color: white;
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
}
.cat-btn.active {
  background: #007aff;
  box-shadow: 0 0 10px rgba(0,122,255,0.5);
}
.cat-btn:active { transform: scale(0.95); }
/* 开始按钮 */
#startBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #007aff;
  border: none;
  padding: 15px 35px;
  border-radius: 50px;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  z-index: 300;
  box-shadow: 0 0 30px rgba(0,122,255,0.8);
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.9; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
.hide { display: none !important; }
/* 加载提示 */
#loading {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  padding: 12px 24px;
  border-radius: 40px;
  color: white;
  z-index: 250;
  font-size: 14px;
  white-space: nowrap;
}
/* 底部状态 */
#status {
  position: fixed;
  top: 60px;
  left: 10px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  padding: 5px 10px;
  border-radius: 20px;
  color: white;
  font-size: 11px;
  z-index: 200;
  pointer-events: none;
}
/* 雷达小地图 */
#radar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 80px;
  height: 80px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  border: 2px solid #00ff88;
  z-index: 150;
}
.radar-dot {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #ff4444;
  border-radius: 50%;
  box-shadow: 0 0 4px #ff0000;
}
</style>
</head>
<body>

<button id="startBtn">🎯 启动城市万花筒</button>
<div id="loading" class="hide">⏳ 定位中...</div>
<div id="debug">初始化</div>
<div id="status">🌍 等待启动</div>
<div id="radar"></div>

<div id="category-bar" class="hide">
  <button class="cat-btn" data-type="餐饮服务">🍔 餐饮</button>
  <button class="cat-btn" data-type="咖啡厅">☕ 咖啡</button>
  <button class="cat-btn" data-type="酒店">🏨 酒店</button>
  <button class="cat-btn" data-type="购物">🛒 购物</button>
  <button class="cat-btn" data-type="景点">🏛️ 景点</button>
  <button class="cat-btn" data-type="KTV">🎤 KTV</button>
  <button class="cat-btn" data-type="加油站">⛽ 加油站</button>
</div>

<a-scene id="scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-camera id="camera" gps-camera rotation-reader></a-camera>
</a-scene>

<script>
// ========== 配置 ==========
const WORKER_URL = 'https://gaode.903329354.workers.dev';
const AMAP_KEY = '28c589f6e6d2f024637ed23a480378c9';
const SEARCH_RADIUS = 500;  // 搜索半径500米
const MAX_POI = 50;

// 当前状态
let currentLat = null, currentLng = null;
let currentHeading = 0;
let allPOIs = [];
let activeType = "餐饮服务";
let isARActive = false;
let watchId = null;

// DOM 元素
const startBtn = document.getElementById('startBtn');
const loadingDiv = document.getElementById('loading');
const debugDiv = document.getElementById('debug');
const statusDiv = document.getElementById('status');
const categoryBar = document.getElementById('category-bar');
const radarDiv = document.getElementById('radar');

// ========== 辅助函数 ==========
function rad(d) { return d * Math.PI / 180; }

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = rad(lat2 - lat1);
  const dLon = rad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLon/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function getBearing(lat1, lon1, lat2, lon2) {
  const y = Math.sin(rad(lon2-lon1)) * Math.cos(rad(lat2));
  const x = Math.cos(rad(lat1))*Math.sin(rad(lat2)) - Math.sin(rad(lat1))*Math.cos(rad(lat2))*Math.cos(rad(lon2-lon1));
  return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
}

// ========== 获取周边POI ==========
async function fetchNearbyPOIs() {
  if (!currentLat || !currentLng) return [];
  
  const url = `${WORKER_URL}?type=search&location=${currentLng},${currentLat}&keywords=${encodeURIComponent(activeType)}&radius=${SEARCH_RADIUS}&offset=${MAX_POI}`;
  
  debugDiv.innerText = `🔍 搜索: ${activeType}...`;
  console.log('请求:', url);
  
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    console.log('返回:', data);
    
    if (data.status === '1' && data.pois && data.pois.length > 0) {
      debugDiv.innerText = `✅ 找到 ${data.pois.length} 个${activeType}`;
      statusDiv.innerText = `📍 ${data.pois.length} 个地点 | 半径${SEARCH_RADIUS}m`;
      return data.pois;
    } else {
      debugDiv.innerText = `⚠️ 附近无${activeType}`;
      statusDiv.innerText = `⚠️ 未找到${activeType}`;
      return [];
    }
  } catch(e) {
    console.error('请求失败:', e);
    debugDiv.innerText = `❌ 请求失败: ${e.message}`;
    return [];
  }
}

// ========== 渲染AR标记 ==========
function renderARMarkers() {
  const scene = document.getElementById('scene');
  if (!scene) return;
  
  // 删除旧的POI标记
  const oldMarkers = scene.querySelectorAll('[gps-entity-place]');
  oldMarkers.forEach(m => m.remove());
  
  if (!allPOIs.length) {
    debugDiv.innerText = `📭 附近没有${activeType}，换个分类试试`;
    radarDiv.innerHTML = '';
    return;
  }
  
  // 更新雷达
  updateRadar();
  
  // 为每个POI创建AR标记
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(',').map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    
    const distance = getDistance(currentLat, currentLng, lat, lng);
    
    // 创建实体
    const entity = document.createElement('a-entity');
    entity.setAttribute('gps-entity-place', `latitude:${lat}; longitude:${lng}`);
    entity.setAttribute('scale', '1.2 1.2 1.2');
    
    // 图标 - 使用圆形加阴影
    const icon = document.createElement('a-circle');
    icon.setAttribute('radius', '0.4');
    icon.setAttribute('color', '#007aff');
    icon.setAttribute('opacity', '0.9');
    icon.setAttribute('material', 'side: double');
    
    // 文字标签
    const text = document.createElement('a-text');
    let shortName = poi.name.length > 12 ? poi.name.substring(0, 12) + '..' : poi.name;
    text.setAttribute('value', `${shortName}\n${distance}m`);
    text.setAttribute('align', 'center');
    text.setAttribute('position', '0 -0.6 0');
    text.setAttribute('color', '#ffffff');
    text.setAttribute('background', 'rgba(0,0,0,0.7)');
    text.setAttribute('width', '2.5');
    text.setAttribute('scale', '0.8 0.8 0.8');
    
    entity.appendChild(icon);
    entity.appendChild(text);
    
    // 点击显示详情
    entity.addEventListener('click', () => {
      statusDiv.innerText = `📍 ${poi.name} | ${distance}m`;
      // 震动反馈（如果支持）
      if (navigator.vibrate) navigator.vibrate(50);
    });
    
    scene.appendChild(entity);
  });
  
  debugDiv.innerText = `🎯 ${allPOIs.length} 个${activeType} 已显示`;
  statusDiv.innerText = `🎯 ${allPOIs.length} 个${activeType} | 转动手机查看`;
}

// ========== 更新雷达 ==========
function updateRadar() {
  if (!currentLat || !currentLng) return;
  radarDiv.innerHTML = '';
  
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(',').map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    
    const bearing = getBearing(currentLat, currentLng, lat, lng);
    const angle = (bearing - currentHeading) * Math.PI / 180;
    const distance = getDistance(currentLat, currentLng, lat, lng);
    
    // 雷达范围150米，超出显示在边缘
    let radius = Math.min(distance, 150) / 150 * 35;
    let x = 40 + radius * Math.sin(angle);
    let y = 40 - radius * Math.cos(angle);
    x = Math.min(78, Math.max(2, x));
    y = Math.min(78, Math.max(2, y));
    
    const dot = document.createElement('div');
    dot.className = 'radar-dot';
    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    dot.title = poi.name;
    radarDiv.appendChild(dot);
  });
}

// ========== 刷新全部 ==========
async function refresh() {
  if (!isARActive) return;
  allPOIs = await fetchNearbyPOIs();
  renderARMarkers();
}

// ========== 切换分类 ==========
async function switchType(type) {
  activeType = type;
  // 更新按钮样式
  document.querySelectorAll('.cat-btn').forEach(btn => {
    if (btn.getAttribute('data-type') === type) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  await refresh();
}

// ========== 启动AR ==========
async function startAR() {
  console.log('启动城市万花筒...');
  loadingDiv.classList.remove('hide');
  
  // 1. 请求方向权限 (iOS)
  if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm !== 'granted') {
        alert('需要方向权限才能使用AR功能');
        loadingDiv.classList.add('hide');
        return;
      }
    } catch(e) {
      alert('请允许方向权限');
      loadingDiv.classList.add('hide');
      return;
    }
  }
  
  // 2. 监听方向
  window.addEventListener('deviceorientationabsolute', (e) => {
    if (!isARActive) return;
    currentHeading = currentHeading * 0.85 + (e.alpha || 0) * 0.15;
    updateRadar();
    // 更新调试
    debugDiv.innerText = `🧭 ${Math.round(currentHeading)}° | ${allPOIs.length}个POI`;
  });
  
  // 3. 获取位置
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      isARActive = true;
      
      // 隐藏启动界面
      startBtn.classList.add('hide');
      loadingDiv.classList.add('hide');
      categoryBar.classList.remove('hide');
      
      debugDiv.innerText = `📍 ${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
      statusDiv.innerText = `📍 定位成功 | 搜索中...`;
      
      // 获取周边POI
      await refresh();
    },
    (err) => {
      alert('定位失败: ' + err.message);
      loadingDiv.classList.add('hide');
      debugDiv.innerText = `❌ 定位失败: ${err.message}`;
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
  
  // 4. 持续追踪位置
  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      if (isARActive) {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        // 位置变化较大时自动刷新
        refresh();
      }
    },
    null,
    { enableHighAccuracy: true }
  );
}

// ========== 绑定事件 ==========
function bindEvents() {
  startBtn.onclick = startAR;
  
  // 分类按钮
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = () => {
      const type = btn.getAttribute('data-type');
      if (type) switchType(type);
    };
  });
}

// ========== 初始化 ==========
bindEvents();
debugDiv.innerText = '📱 点击下方按钮启动';

// 定时更新雷达
setInterval(() => {
  if (isARActive) {
    updateRadar();
  }
}, 200);
</script>
</body>
</html>
