<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>春哥的城市万花筒AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<style>
* { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
body { margin:0; overflow:hidden; font-family:"微软雅黑",sans-serif; }

/* 顶部调试信息 */
#debug {
  position:fixed;
  top:5px;
  left:5px;
  background:rgba(0,0,0,0.7);
  color:#0f0;
  font-size:10px;
  z-index:9999;
  padding:5px 8px;
  border-radius:6px;
  font-family:monospace;
  pointer-events:none;
  backdrop-filter:blur(4px);
  max-width:70%;
  line-height:1.3;
}

/* 菜单按钮 - 右上角 */
#menu-toggle {
  position:fixed;
  top:10px;
  right:10px;
  width:38px;
  height:38px;
  background:rgba(0,0,0,0.7);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
  cursor:pointer;
  color:white;
  font-size:20px;
  backdrop-filter:blur(5px);
}

/* 顶部菜单 */
#top-bar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  padding:12px 12px 12px 16px;
  z-index:15;
  transform:translateY(-100%);
  transition:transform 0.3s ease;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
#top-bar.open {
  transform:translateY(0);
}
.button {
  color:#fff;
  padding:5px 12px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  cursor:pointer;
  font-size:11px;
  border:none;
}
.button.active {
  background:#007aff;
}

/* 卡片 */
#card {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(20px);
  color:#fff;
  padding:14px;
  border-radius:18px;
  display:none;
  width:260px;
  z-index:11;
  text-align:center;
}
.close-btn {
  position:absolute;
  top:6px;
  right:10px;
  background:none;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}
.nav-btn {
  width:100%;
  margin-top:10px;
  background:#007aff;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
}

/* 雷达 */
#radar {
  position:fixed;
  right:10px;
  bottom:90px;
  width:80px;
  height:80px;
  background:rgba(0,0,0,0.6);
  border-radius:50%;
  border:2px solid #00ff00;
  z-index:10;
}
.dot {
  position:absolute;
  width:6px;
  height:6px;
  background:#ff4444;
  border-radius:50%;
}

/* ========== 搜索区域 - 缩小版 ========== */
#search-container {
  position:fixed;
  bottom:15px;
  left:15px;
  right:15px;
  z-index:20;
  display:flex;
  flex-direction:column;
  gap:5px;
  max-width: calc(100% - 30px);
}
#search-box {
  display:flex;
  gap:8px;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  border-radius:50px;
  padding:4px;
  border:1px solid rgba(255,255,255,0.2);
}
#search-input {
  flex:1;
  background:rgba(255,255,255,0.1);
  border:none;
  padding:8px 15px;
  border-radius:50px;
  color:#fff;
  font-size:13px;
  outline:none;
}
#search-input::placeholder {
  color:rgba(255,255,255,0.5);
  font-size:12px;
}
#search-btn {
  background:#007aff;
  border:none;
  padding:6px 16px;
  border-radius:50px;
  color:#fff;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}

/* 联想下拉框 */
#suggestions {
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(10px);
  border-radius:16px;
  max-height:150px;
  overflow-y:auto;
  display:none;
  border:1px solid rgba(255,255,255,0.15);
}
.suggestion-item {
  padding:8px 15px;
  color:#fff;
  font-size:13px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}
.suggestion-item:active {
  background:rgba(255,255,255,0.2);
}
.suggestion-item:last-child {
  border-bottom:none;
}

/* 开始按钮 */
#startBtn {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  z-index:30;
  padding:10px 24px;
  background:#007aff;
  color:#fff;
  border:none;
  border-radius:40px;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
}
#startBtn.hidden {
  display:none;
}

/* 加载提示 */
#loading {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);
  color:#fff;
  padding:10px 20px;
  border-radius:30px;
  font-size:13px;
  z-index:25;
  display:none;
}
</style>
</head>
<body>

<button id="startBtn">🎯 开启AR导航</button>
<div id="loading">⏳ 定位中...</div>
<div id="menu-toggle">☰</div>
<div id="top-bar">
  <button class="button" data-cat="餐饮服务">🍽️ 餐厅</button>
  <button class="button" data-cat="咖啡厅">☕ 咖啡</button>
  <button class="button" data-cat="酒店">🏨 酒店</button>
  <button class="button" data-cat="KTV">🎤 KTV</button>
  <button class="button" data-cat="宾馆">🛏️ 宾馆</button>
  <button class="button" data-cat="汽修|维修厂">🔧 修理厂</button>
  <button class="button" data-cat="加油站">⛽ 加油站</button>
  <button class="button" data-cat="学校">📚 学校</button>
  <button class="button" data-cat="医院">🏥 医院</button>
</div>
<div id="card">
  <button class="close-btn" onclick="document.getElementById('card').style.display='none'">✕</button>
  <div id="card-content"></div>
</div>
<div id="radar"></div>
<div id="debug">🔴 未启动</div>
<div id="search-container">
  <div id="search-box">
    <input type="text" id="search-input" placeholder="🔍 搜索地点..." autocomplete="off" />
    <button id="search-btn">搜索</button>
  </div>
  <div id="suggestions"></div>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-camera gps-camera rotation-reader></a-camera>
</a-scene>

<script>
const WORKER_URL = 'https://gaode.903329354.workers.dev';
const maxPOI = 35;

// 分类配置
const categories = [
  { name: "餐厅", keyword: "餐饮服务", icon: "https://cdn-icons-png.flaticon.com/512/3075/3075977.png" },
  { name: "咖啡", keyword: "咖啡厅", icon: "https://cdn-icons-png.flaticon.com/512/924/924514.png" },
  { name: "酒店", keyword: "酒店", icon: "https://cdn-icons-png.flaticon.com/512/139/139899.png" },
  { name: "KTV", keyword: "KTV", icon: "https://cdn-icons-png.flaticon.com/512/3148/3148405.png" },
  { name: "宾馆", keyword: "宾馆", icon: "https://cdn-icons-png.flaticon.com/512/3095/3095100.png" },
  { name: "修理厂", keyword: "汽修|维修厂", icon: "https://cdn-icons-png.flaticon.com/512/3000/3000452.png" },
  { name: "加油站", keyword: "加油站", icon: "https://cdn-icons-png.flaticon.com/512/3109/3109006.png" },
  { name: "学校", keyword: "学校", icon: "https://cdn-icons-png.flaticon.com/512/2942/2942702.png" },
  { name: "医院", keyword: "医院", icon: "https://cdn-icons-png.flaticon.com/512/3043/3043710.png" }
];

let userLat = null, userLng = null;
let smoothHeading = 0;
let allPOIs = [];
let currentCategory = categories[0];
let isARStarted = false;
let locationWatchId = null;
let isMenuOpen = false;
let customKeyword = null;

// ========== 高德输入提示（联想） ==========
let suggestTimeout = null;

async function fetchSuggestions(keyword) {
  if (!keyword || keyword.length < 2) {
    document.getElementById("suggestions").style.display = "none";
    return;
  }
  
  // 使用高德输入提示API
  const url = `https://restapi.amap.com/v3/assistant/inputtips?key=28c589f6e6d2f024637ed23a480378c9&keywords=${encodeURIComponent(keyword)}&location=${userLng || 121.0769},${userLat || 31.9268}`;
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.status === "1" && data.tips && data.tips.length > 0) {
      const suggestions = document.getElementById("suggestions");
      suggestions.innerHTML = "";
      // 去重显示前8个
      const seen = new Set();
      const uniqueTips = data.tips.filter(tip => {
        if (seen.has(tip.name)) return false;
        seen.add(tip.name);
        return true;
      }).slice(0, 8);
      
      uniqueTips.forEach(tip => {
        const div = document.createElement("div");
        div.className = "suggestion-item";
        div.innerText = tip.name;
        if (tip.address) div.innerText += ` · ${tip.address.substring(0, 20)}`;
        div.onclick = () => {
          document.getElementById("search-input").value = tip.name;
          document.getElementById("suggestions").style.display = "none";
          customSearchWithKeyword(tip.name);
        };
        suggestions.appendChild(div);
      });
      suggestions.style.display = "block";
    } else {
      document.getElementById("suggestions").style.display = "none";
    }
  } catch (e) {
    console.log("联想失败:", e);
    document.getElementById("suggestions").style.display = "none";
  }
}

function onSearchInput() {
  if (suggestTimeout) clearTimeout(suggestTimeout);
  const keyword = document.getElementById("search-input").value;
  suggestTimeout = setTimeout(() => {
    fetchSuggestions(keyword);
  }, 300);
}

// ========== 菜单折叠 ==========
function toggleMenu() {
  isMenuOpen = !isMenuOpen;
  const bar = document.getElementById("top-bar");
  bar.classList.toggle("open", isMenuOpen);
}

// ========== 切换分类 ==========
async function switchCategory(cat) {
  if (!isARStarted) return;
  currentCategory = cat;
  customKeyword = null;
  document.getElementById("search-input").value = "";
  document.getElementById("suggestions").style.display = "none";
  
  document.querySelectorAll(".button").forEach((btn, idx) => {
    if (idx < categories.length && categories[idx].keyword === cat.keyword) {
      btn.classList.add("active");
    } else if (idx < categories.length) {
      btn.classList.remove("active");
    }
  });
  
  document.getElementById("card").style.display = "none";
  await fetchPOIs();
  renderPOIs();
}

// ========== 自定义搜索 ==========
async function customSearchWithKeyword(keyword) {
  if (!isARStarted) {
    alert("请先点击「开启AR导航」");
    return;
  }
  if (!keyword) {
    keyword = document.getElementById("search-input").value.trim();
  }
  if (!keyword) {
    alert("请输入搜索内容");
    return;
  }
  
  customKeyword = keyword;
  document.querySelectorAll(".button").forEach(btn => btn.classList.remove("active"));
  document.getElementById("suggestions").style.display = "none";
  await fetchPOIs();
  renderPOIs();
}

async function customSearch() {
  await customSearchWithKeyword(null);
}

// ========== 获取POI数据 ==========
async function fetchPOIs() {
  if (!userLat || !userLng || !isARStarted) return;
  
  let keyword;
  if (customKeyword) {
    keyword = customKeyword;
  } else {
    keyword = currentCategory.keyword;
  }
  
  // 直接使用 keywords 参数，让高德自动匹配
  const url = `${WORKER_URL}?location=${userLng},${userLat}&keywords=${encodeURIComponent(keyword)}&radius=3000&offset=${maxPOI}`;
  
  console.log("请求:", url);
  updateDebugMsg("搜索中...");
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    console.log("返回:", data);
    
    if (data.status === "1" && data.pois && data.pois.length > 0) {
      allPOIs = data.pois.slice(0, maxPOI);
      const searchType = customKeyword ? `"${customKeyword}"` : currentCategory.name;
      updateDebugMsg(`✅ ${allPOIs.length}个${searchType}`);
    } else {
      updateDebugMsg(`⚠️ 未找到"${customKeyword || keyword}"`);
      allPOIs = [];
    }
  } catch (e) {
    console.error("请求失败:", e);
    updateDebugMsg(`请求失败`);
    allPOIs = [];
  }
}

function toRad(d) { return d * Math.PI / 180; }

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

function getBearing(lat1, lon1, lat2, lon2) {
  const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function updateRadar() {
  const radar = document.getElementById("radar");
  radar.innerHTML = "";
  if (!userLat || !allPOIs || allPOIs.length === 0) return;
  
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(",").map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    
    const bearing = getBearing(userLat, userLng, lat, lng);
    const angle = (bearing - smoothHeading) * Math.PI / 180;
    const distance = getDistance(userLat, userLng, lat, lng);
    
    let radiusFromCenter = Math.min(distance, 150) / 150 * 35;
    let x = 40 + radiusFromCenter * Math.sin(angle);
    let y = 40 - radiusFromCenter * Math.cos(angle);
    x = Math.min(75, Math.max(5, x));
    y = Math.min(75, Math.max(5, y));
    
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.style.left = x + "px";
    dot.style.top = y + "px";
    dot.title = `${poi.name} (${distance}m)`;
    radar.appendChild(dot);
  });
}

function renderPOIs() {
  if (!userLat || !allPOIs || allPOIs.length === 0 || !isARStarted) return;
  
  const scene = document.querySelector("a-scene");
  if (!scene) return;
  
  const oldEntities = scene.querySelectorAll('[gps-entity-place]');
  oldEntities.forEach(e => e.remove());
  
  updateRadar();
  
  let iconUrl = "https://cdn-icons-png.flaticon.com/512/684/684908.png";
  if (!customKeyword && currentCategory.icon) {
    iconUrl = currentCategory.icon;
  }
  
  allPOIs.forEach(poi => {
    if (!poi.location) return;
    const [lng, lat] = poi.location.split(",").map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    
    const distance = getDistance(userLat, userLng, lat, lng);
    
    const entity = document.createElement("a-entity");
    entity.setAttribute("gps-entity-place", `latitude:${lat}; longitude:${lng}`);
    entity.setAttribute("scale", "1 1 1");
    
    const img = document.createElement("a-image");
    img.setAttribute("src", iconUrl);
    img.setAttribute("scale", "1 1 1");
    
    const text = document.createElement("a-text");
    const shortName = poi.name.length > 10 ? poi.name.substring(0, 10) + ".." : poi.name;
    text.setAttribute("value", `${shortName}\n${distance}m`);
    text.setAttribute("align", "center");
    text.setAttribute("position", "0 -0.7 0");
    text.setAttribute("color", "#fff");
    text.setAttribute("background", "rgba(0,0,0,0.5)");
    text.setAttribute("width", "2");
    
    entity.appendChild(img);
    entity.appendChild(text);
    entity.addEventListener("click", () => showCard(poi, distance, lng, lat));
    scene.appendChild(entity);
  });
  
  const searchType = customKeyword ? `"${customKeyword}"` : currentCategory.name;
  updateDebugMsg(`${allPOIs.length}个${searchType} · ${Math.round(smoothHeading)}°`);
}

function showCard(poi, dist, lng, lat) {
  const cardContent = document.getElementById("card-content");
  cardContent.innerHTML = `
    <div style="font-size:16px; font-weight:bold;">${poi.name}</div>
    <div style="margin:5px 0;">🗺️ ${dist}米</div>
    <div style="font-size:11px;">📍 ${poi.address || "暂无"}</div>
    ${poi.tel ? `<div style="font-size:11px;">📞 ${poi.tel}</div>` : ""}
    <button class="nav-btn" onclick="goNav('${lng}','${lat}','${poi.name.replace(/'/g, "\\'")}')">🧭 导航</button>
  `;
  document.getElementById("card").style.display = "block";
}

function goNav(lng, lat, name) {
  window.open(`https://uri.amap.com/navigation?to=${lng},${lat},${encodeURIComponent(name)}&mode=car`);
}

function updateDebugMsg(extra = "") {
  const searchInfo = customKeyword ? `🔍 ${customKeyword}` : `📁 ${currentCategory.name}`;
  const msg = `${userLat?.toFixed(4) || "?"}, ${userLng?.toFixed(4) || "?"}\n${searchInfo} | ${allPOIs?.length || 0}个 | ${Math.round(smoothHeading)}°\n${extra}`;
  document.getElementById("debug").innerText = msg;
}

// ========== 启动AR ==========
let isStarting = false;

async function startAR() {
  if (isStarting || isARStarted) return;
  isStarting = true;
  
  const loading = document.getElementById("loading");
  const startBtn = document.getElementById("startBtn");
  
  loading.style.display = "block";
  startBtn.disabled = true;
  
  try {
    if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
      try {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== "granted") {
          alert("需要方向权限");
          loading.style.display = "none";
          startBtn.disabled = false;
          isStarting = false;
          return;
        }
      } catch (e) {
        alert("请允许方向权限");
        loading.style.display = "none";
        startBtn.disabled = false;
        isStarting = false;
        return;
      }
    }
    
    window.addEventListener("deviceorientationabsolute", (e) => {
      if (!isARStarted) return;
      smoothHeading = smoothHeading * 0.9 + (e.alpha || 0) * 0.1;
      renderPOIs();
    });
    
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        isARStarted = true;
        
        startBtn.classList.add("hidden");
        loading.style.display = "none";
        
        updateDebugMsg("定位成功");
        await fetchPOIs();
        renderPOIs();
        
        isMenuOpen = true;
        document.getElementById("top-bar").classList.add("open");
        isStarting = false;
      },
      (err) => {
        alert("定位失败: " + err.message);
        loading.style.display = "none";
        startBtn.disabled = false;
        startBtn.classList.remove("hidden");
        isStarting = false;
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
    
    locationWatchId = navigator.geolocation.watchPosition(
      (pos) => {
        if (isARStarted) {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          renderPOIs();
        }
      },
      null,
      { enableHighAccuracy: true }
    );
  } catch (e) {
    loading.style.display = "none";
    startBtn.disabled = false;
    isStarting = false;
  }
}

// ========== 绑定事件 ==========
function bindEvents() {
  document.getElementById("menu-toggle").onclick = toggleMenu;
  
  document.querySelectorAll(".button").forEach((btn, idx) => {
    btn.onclick = () => {
      if (idx < categories.length) switchCategory(categories[idx]);
    };
  });
  
  document.getElementById("search-btn").onclick = customSearch;
  document.getElementById("search-input").addEventListener("input", onSearchInput);
  document.getElementById("search-input").onkeypress = (e) => {
    if (e.key === "Enter") customSearch();
  };
  
  // 点击其他地方关闭联想
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#search-container")) {
      document.getElementById("suggestions").style.display = "none";
    }
  });
  
  document.getElementById("startBtn").onclick = startAR;
}

bindEvents();
document.getElementById("top-bar").classList.remove("open");

setInterval(() => {
  if (!isARStarted) {
    document.getElementById("debug").innerHTML = "🔴 未启动\n点击下方按钮";
  } else if ((!allPOIs || allPOIs.length === 0) && userLat) {
    updateDebugMsg("搜索中...");
  } else if (userLat) {
    updateDebugMsg();
  }
}, 1000);
</script>
</body>
</html>
